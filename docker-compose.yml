services:
  eduai-app:
    container_name: eduai-assistant
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-eduai-assistant-2026}
      - DATABASE_URL=sqlite:///./data/eduai.db
    volumes:
      - eduai_db_data:/app/data
    restart: unless-stopped

volumes:
  eduai_db_data:
